site_name: CodeSensei
site_description: Documentation for CodeSensei Platform
theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.sections
    - navigation.top
    - navigation.tabs
    - search.suggest
    - search.highlight

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - tables
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Getting Started:
      - Setup Guide: setup.md
      - Architecture: architecture.md
  - Core Features:
      - API Routes: api.md
      - Conversion System: conversion.md
      - Viva / Interview Mode: viva.md
  - Guides:
      - Security: security.md
      - Contributing: contributing.md
